name: Lighthouse CI

on:
  workflow_dispatch:

jobs:
  lhci:
    runs-on: ubuntu-latest
    env:
      # Prisma runs on `npm ci` via postinstall and requires DATABASE_URL to be present.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/lhci?schema=public' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app for Lighthouse
        run: npm run build:lhci

      - name: Run Lighthouse CI
        env:
          LHCI_LOCALE: tr
          LHCI_LISTING_SLUG: ${{ vars.LHCI_LISTING_SLUG }}
          LHCI_PROJECT_SLUG: ${{ vars.LHCI_PROJECT_SLUG }}
        run: npm run lhci
